worker_processes 1;
error_log /dev/stderr warn;
events { worker_connections 1024; }
http {
    access_log off;
    # DEFAULT settings - represent "deploy behind nginx" reverse-proxy mode
    # client_body_buffer_size default is 8k or 16k
    proxy_buffering on;
    proxy_request_buffering on;
    upstream upstream_app { server 127.0.0.1:9000; }
    server {
        listen 8000 default_server;
        location = /health { return 200 '{"ok":true}'; default_type application/json; }
        location = /upload {
            content_by_lua_block {
                -- Capture how the body arrived: count chunks via reading raw socket?
                -- Simpler: just measure how many recv calls nginx made by counting
                -- via ngx.log. But for our purpose, just read body.
                ngx.req.read_body()
                local body = ngx.req.get_body_data()
                local n = body and #body or 0
                local f = ngx.req.get_body_file()
                ngx.header.content_type = "application/json"
                ngx.say('{"len":' .. n .. ',"file":"' .. (f or "") .. '"}')
            }
        }
    }
}
